<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Language App</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<html>
    
    <body class="min-h-screen bg-gradient-to-br from-blue-50 to-purple-50">

    <header class="fixed top-0 left-0 w-full bg-white bg-opacity-70 backdrop-filter backdrop-blur-md shadow-md z-10">
        <div class="container mx-auto flex items-center justify-between py-4 px-6">
        <a href="/" class="text-xl font-bold text-gray-800">Language App</a>
        <nav>
            <ul class="flex space-x-6">
                <li><a href="{{ url_for('register') }}" class="text-gray-600 hover:text-gray-800">Register</a></li>
                <li><a href="{{ url_for('login') }}" class="text-gray-600 hover:text-gray-800">Login</a></li>
            </ul>
        </nav>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center pt-28 pb-16 px-6">
        <div class="max-w-md w-full bg-white bg-opacity-70 backdrop-filter backdrop-blur-md border border-gray-200 rounded-lg shadow-lg p-8">
            <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Welcome back broksi we missed u sm</h1>

        <form method="POST">
        {{ form.hidden_tag() }}

        <div class="mb-6">
            <label class="block text-md font-medium text-gray-700 mb-2" for="username">Nom d'utilisateur</label>

            <input class="w-full border py-1 border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-purple-400 transition font-[Noto Sans]" type="text" id="username" name="username" required>

        </div>

        <div class="mb-6">
            <label class="block text-md font-medium text-gray-700 mb-2" for="password">Mot de passe</label>

            <input class="w-full border py-1 border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-purple-400 transition font-[Noto Sans]" type="password" id="password" name="password" required placeholder=" ••••••••">
            
        </div>

        {% if message_login %}
        <div class="mb-4 bg-red-50 border border-red-200 text-red-500 text-sm rounded-lg px-4 py-3">
            {{ message_login }}
        </div>
        {% endif %}

        <button type="submit" class="w-full bg-purple-500 font-medium text-white px-4 py-2 rounded hover:bg-purple-600">Connexion</button>

        </form>

    

        <p class="text-center text-sm text-gray-500 mt-6"> No account yet?
            <a href="{{ url_for('register') }}" class="text-purple-500 hover:underline font-medium">
                Register here!
            </a>
        </p>

    </main>

    <footer class="bg-white bg-opacity-70 backdrop-filter backdrop-blur-md shadow-inner">
        <div class="max-w-5xl mx-auto px-6 py-6 flex flex-col md:flex-row items-center justify-between text-gray-600 text-center"> &copy; 2025 Language App. All rights reserved.
        </div>
    </footer>

</body>
</html>
