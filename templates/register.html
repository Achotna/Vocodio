<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription – Language App</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script>
        (function() {
            const stored = localStorage.getItem("theme");
            const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            if (stored === "dark" || (!stored && prefersDark)) {
                document.documentElement.classList.add("dark");
            }
        })();
    </script>
</head>

<html>
<body class="animated-gradient min-h-screen flex flex-col transition-colors duration-500">

    <!-- HEADER — identical to login -->
    <header class="fixed top-0 left-0 w-full z-10
                   bg-white bg-opacity-70 backdrop-filter backdrop-blur-md shadow-md
                   dark:bg-slate-900 dark:bg-opacity-70 transition-colors duration-500">
        <div class="container mx-auto flex items-center justify-between py-4 px-6">
            <a href="/" class="text-xl font-bold text-gray-800 dark:text-white">Language App</a>
            <nav>
                <ul class="flex items-center space-x-4">
                    <li>
                        <a href="{{ url_for('register') }}"
                           class="bg-purple-400 text-white px-4 py-2 rounded hover:bg-purple-500 transition">
                            S'inscrire
                        </a>
                    </li>
                    <li>
                        <a href="{{ url_for('login') }}"
                           class="text-gray-600 hover:text-gray-800 border border-gray-300 px-4 py-2 rounded hover:bg-gray-100 transition
                                  dark:text-slate-300 dark:border-slate-600 dark:hover:bg-slate-700">
                            Connexion
                        </a>
                    </li>
                    <li>
                        <button id="darkmode-toggle"
                                class="text-xl px-2 py-1 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700 transition"
                                title="Changer de thème">
                            <img id="theme-icon"
                                 src="{{ url_for('static', filename='images/dark_mode_inv.png') }}"
                                 alt="Changer de thème"
                                 class="w-5 h-5">
                        </button>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center pt-28 pb-16 px-6">

        <div class="login-card fade-up delay-1 w-full max-w-md p-8 border rounded-lg shadow-lg bg-white bg-opacity-10 backdrop-filter backdrop-blur-md transition">

            <h1 class="fade-up delay-2 text-4xl font-bold text-gray-800 mb-5 text-center dark:text-white">
                Inscription
            </h1>
            <p class="fade-up delay-2 text-center text-gray-800 text-sm mb-8 dark:text-white">
                Hohoho who's that new face? Quick, register before I eat your pencilcase
            </p>

            <form method="POST">
                {{ form.hidden_tag() }}

                <div class="fade-up delay-3 mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-1 dark:text-white"
                           for="username">Nom d'utilisateur</label>
                    <input type="text" id="username" name="username" required
                           class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm
                                  focus:outline-none focus:ring-2 focus:ring-purple-400 transition"
                           placeholder="Ton nom d'utilisateur">
                </div>

                <div class="fade-up delay-4 mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-1 dark:text-white"
                           for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" required
                           class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm
                                  focus:outline-none focus:ring-2 focus:ring-purple-400 transition dark:text-white"
                           placeholder="••••••••">
                </div>

                {% if message_login %}
                <div class="fade-up delay-4 mb-4 bg-red-50 border border-red-200 text-red-500 text-sm rounded-lg px-4 py-3">
                    {{ message_login }}
                </div>
                {% endif %}

                <div class="fade-up delay-5">
                    <button type="submit"
                            class="w-full bg-purple-400 text-white font-medium py-2 rounded-lg
                                   hover:bg-purple-500 transition">
                        Créer mon compte
                    </button>
                </div>
            </form>

            <p class="fade-up delay-6 text-center text-sm text-gray-500 mt-6 dark:text-white">
                Déjà un compte ?
                <a href="{{ url_for('login') }}" class="text-purple-400 hover:underline font-medium">
                    Connectez-vous ici !
                </a>
            </p>

        </div>
    </main>

    <footer class="bg-white bg-opacity-70 backdrop-filter backdrop-blur-md shadow-inner
                   dark:bg-slate-900 dark:bg-opacity-70 transition-colors duration-500">
        <div class="max-w-5xl mx-auto px-6 py-6 text-center text-gray-400 dark:text-slate-500 text-sm">
            &copy; 2025 Language App. All rights reserved.
        </div>
    </footer>

    <script>
        const toggleDarkMode = document.getElementById("darkmode-toggle");
        const themeIcon = document.getElementById("theme-icon");

        const iconDark  = "{{ url_for('static', filename='images/dark_mode_inv.png') }}";
        const iconLight = "{{ url_for('static', filename='images/light_mode.png') }}";

        function initTheme() {
            const storedTheme = localStorage.getItem("theme");
            const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            if (storedTheme === "dark" || (!storedTheme && prefersDark)) {
                document.documentElement.classList.add("dark");
                themeIcon.src = iconLight;
            } else {
                document.documentElement.classList.remove("dark");
                themeIcon.src = iconDark;
            }
        }

        initTheme();

        toggleDarkMode.addEventListener("click", () => {
            document.documentElement.classList.toggle("dark");
            const isDark = document.documentElement.classList.contains("dark");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            themeIcon.src = isDark ? iconLight : iconDark;
        });
    </script>

</body>
</html>
